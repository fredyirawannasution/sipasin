<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arsip Internal - KPU Labuhanbatu Utara</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="assets/icon/icon-192.png" />

  <style>
    :root{
      --bg1:#e2e8f0;
      --bg2:#cbd5e1;
      --primary:#0f172a;
      --secondary:#1e293b;
      --accent:#38bdf8;
      --text:#0f172a;
      --white:#ffffff;
      --shadow:0 10px 30px rgba(15, 23, 42, 0.15);
      --shadow-soft:0 6px 18px rgba(15, 23, 42, 0.10);
      --radius:18px;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      height:100%;
      font-family:"Segoe UI", system-ui, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(56,189,248,.20), transparent 25%),
        radial-gradient(circle at bottom right, rgba(14,165,233,.18), transparent 25%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow:hidden;
    }

    body{
      display:flex;
      flex-direction:column;
    }

    /* SPLASH SCREEN */
    #splash{
      position:fixed;
      inset:0;
      background:linear-gradient(160deg, #0f172a, #1e293b);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color:white;
      z-index:9999;
      transition:opacity .6s ease, visibility .6s ease;
    }

    #splash.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    #splash img{
      width:110px;
      margin-bottom:18px;
      filter:drop-shadow(0 10px 20px rgba(0,0,0,.25));
      animation:floatLogo 2.5s ease-in-out infinite;
    }

    #splash .title{
      font-size:28px;
      font-weight:700;
      letter-spacing:1px;
      margin-bottom:6px;
      animation:fadeUp .8s ease;
    }

    #splash .subtitle{
      font-size:14px;
      opacity:.9;
      letter-spacing:2px;
      text-transform:uppercase;
      animation:fadeUp 1.1s ease;
    }

    .spinner{
      width:42px;
      height:42px;
      border:4px solid rgba(255,255,255,.18);
      border-top:4px solid #38bdf8;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-top:24px;
      box-shadow:0 0 20px rgba(56,189,248,.35);
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(18px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes floatLogo{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-8px); }
    }

    /* HEADER */
    header{
      margin:14px 14px 10px;
      background:rgba(30, 41, 59, 0.82);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      color:white;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      font-size:14px;
      font-weight:600;
      border-radius:18px;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.10);
      animation:fadeUp .8s ease;
    }

    header .left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      flex:1;
    }

    header img{
      width:42px;
      height:42px;
      object-fit:contain;
      border-radius:12px;
      background:rgba(255,255,255,.08);
      padding:4px;
      box-shadow:var(--shadow-soft);
    }

    header .title-wrap{
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    header .main-title{
      font-size:14px;
      font-weight:700;
      line-height:1.3;
    }

    header .sub-title{
      font-size:12px;
      opacity:.9;
      margin-top:6px;
      display:flex;
      flex-wrap:wrap;
      gap:10px 14px;
      align-items:center;
    }

    .top-link{
      display:inline-flex;
      align-items:center;
      gap:6px;
      color:#cbeafe;
      text-decoration:none;
      transition:.2s ease;
    }

    .top-link:hover{
      color:#ffffff;
      text-decoration:underline;
    }

    .top-link svg{
      width:14px;
      height:14px;
      flex-shrink:0;
      fill:currentColor;
    }

    header .right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      flex-shrink:0;
    }

    .contact-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      opacity:.95;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(56,189,248,.14);
      border:1px solid rgba(56,189,248,.25);
      white-space:nowrap;
      color:#ffffff;
      text-decoration:none;
      transition:.2s ease;
    }

    .contact-btn:hover{
      background:rgba(56,189,248,.24);
      transform:translateY(-1px);
    }

    .contact-btn svg{
      width:15px;
      height:15px;
      flex-shrink:0;
      fill:currentColor;
    }

    /* CONTENT WRAPPER */
    .frame-wrapper{
      flex:1;
      margin:0 14px 14px;
      background:rgba(255,255,255,.55);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.35);
      animation:fadeUp 1s ease;
      position:relative;
    }

    .frame-wrapper::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:4px;
      background:linear-gradient(90deg, #38bdf8, #0ea5e9, #7dd3fc);
      z-index:2;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:#fff;
    }

    /* RESPONSIVE */
    @media (max-width: 768px){
      body{
        overflow:auto;
      }

      header{
        flex-direction:column;
        align-items:flex-start;
      }

      header .right{
        width:100%;
        justify-content:flex-start;
      }

      header .main-title{
        font-size:13px;
      }

      #splash .title{
        font-size:24px;
        text-align:center;
      }

      #splash .subtitle{
        text-align:center;
        padding:0 20px;
        letter-spacing:1px;
      }
    }
  </style>
</head>
<body>

  <!-- SPLASH -->

  <!-- CONTENT -->
  <div class="frame-wrapper">
    <iframe
      src="https://script.google.com/macros/s/AKfycbwL206Yd6ItXlGl4kKljs6lRNDkbFjhYv1gIRKQOk4OD7nVqU0q_DuqicJ7BhVwwicGsQ/exec"
      onload="hideSplash()"
    ></iframe>
  </div>

  <script>
    function hideSplash() {
      const splash = document.getElementById('splash');
      splash.classList.add('hide');
      setTimeout(() => {
        splash.style.display = 'none';
      }, 700);
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>

</body>
</html>
