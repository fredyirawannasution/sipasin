<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arsip Internal - KPU Labuhanbatu Utara</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="assets/icon/icon-192.png" />

  <style>
    :root{
      --bg1:#e2e8f0;
      --bg2:#cbd5e1;
      --primary:#0f172a;
      --accent:#38bdf8;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      height:100%;
      font-family:"Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56,189,248,.20), transparent 25%),
        radial-gradient(circle at bottom right, rgba(14,165,233,.18), transparent 25%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow:hidden;
    }

    body{
      display:flex;
      flex-direction:column;
    }

    /* SPLASH */
    #splash{
      position:fixed;
      inset:0;
      background:linear-gradient(160deg, #0f172a, #1e293b);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color:white;
      z-index:9999;
      transition:opacity .6s ease, visibility .6s ease;
    }

    #splash.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    #splash img{
      width:110px;
      margin-bottom:18px;
      animation:floatLogo 2.5s ease-in-out infinite;
    }

    #splash .title{
      font-size:28px;
      font-weight:700;
      margin-bottom:6px;
    }

    #splash .subtitle{
      font-size:14px;
      opacity:.9;
      letter-spacing:2px;
      text-transform:uppercase;
    }

    .spinner{
      width:42px;
      height:42px;
      border:4px solid rgba(255,255,255,.18);
      border-top:4px solid #38bdf8;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin-top:24px;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    @keyframes floatLogo{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-8px); }
    }

    /* FULL FRAME */
    .frame-wrapper{
      flex:1;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:#fff;
    }

    @media (max-width: 768px){
      body{
        overflow:auto;
      }
    }
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <img src="assets/icon/icon-512.png" alt="Logo" />
    <div class="title">ARSIP INTERNAL</div>
    <div class="subtitle">KPU Labuhanbatu Utara</div>
    <div class="spinner"></div>
  </div>

  <!-- FULL CONTENT -->
  <div class="frame-wrapper">
    <iframe
      src="https://script.google.com/macros/s/AKfycbzthXHI0FNdQjTAxKZw2_nS5t5K2AwcJtbwtB28BdUygctufTFOHX47LBB4lj4JesCG1w/exec"
      onload="hideSplash()"
    ></iframe>
  </div>

  <script>
    function hideSplash() {
      const splash = document.getElementById('splash');
      splash.classList.add('hide');
      setTimeout(() => {
        splash.style.display = 'none';
      }, 700);
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>

</body>
</html>
